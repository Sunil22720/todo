<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Elevate Your Productivity</title>
  <!-- Outfit Font from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
            <path d="m9 12 2 2 4-4" />
          </svg>
        </div>
        <div>
          <h1>TaskFlow</h1>
          <p id="current-date" class="header-date">Friday, June 5</p>
        </div>
      </div>

      <!-- Theme Switcher -->
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
        </svg>
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg>
      </button>
    </header>

    <!-- Stats Dashboard Section -->
    <section class="dashboard-card">
      <div class="stats-left">
        <h2>Your Progress</h2>
        <p class="motivational-text" id="motivation-msg">Start completing tasks to build momentum!</p>
        <div class="numeric-stats">
          <span id="completed-count">0</span> / <span id="total-count">0</span> tasks completed
        </div>
      </div>
      <div class="stats-right">
        <!-- SVG Circular Progress Bar -->
        <div class="progress-ring-container">
          <svg class="progress-ring" width="80" height="80">
            <circle class="progress-ring-circle-bg" stroke="var(--border-color)" stroke-width="8" fill="transparent"
              r="32" cx="40" cy="40" />
            <circle id="progress-circle" class="progress-ring-circle" stroke="url(#progress-gradient)" stroke-width="8"
              fill="transparent" r="32" cx="40" cy="40" />
            <defs>
              <linearGradient id="progress-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="var(--accent-gradient-start)" />
                <stop offset="100%" stop-color="var(--accent-gradient-end)" />
              </linearGradient>
            </defs>
          </svg>
          <div class="progress-ring-text" id="progress-percent">0%</div>
        </div>
      </div>
    </section>

    <!-- Task Input Form Card -->
    <section class="input-card">
      <form id="task-form">
        <div class="form-row">
          <div class="form-group flex-grow">
            <label for="task-input">What needs to be done?</label>
            <input type="text" id="task-input" placeholder="e.g. Design user landing page..." required
              autocomplete="off">
          </div>
        </div>

        <div class="form-row form-meta-row">
          <div class="form-group">
            <label for="task-category">Category</label>
            <select id="task-category">
              <option value="Personal">🏠 Personal</option>
              <option value="Work">💼 Work</option>
              <option value="Health">💪 Health</option>
              <option value="Shopping">🛒 Shopping</option>
              <option value="Finance">💵 Finance</option>
              <option value="Other">🏷️ Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="Low">🟢 Low</option>
              <option value="Medium" selected>🟡 Medium</option>
              <option value="High">🔴 High</option>
            </select>
          </div>

          <div class="form-group">
            <label for="task-date">Due Date</label>
            <input type="date" id="task-date">
          </div>

          <div class="form-group button-group">
            <button type="submit" class="btn-add">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M5 12h14" />
              </svg>
              Add Task
            </button>
          </div>
        </div>
      </form>
    </section>

    <!-- Toolbar: Search, Filters & Sort -->
    <section class="toolbar-card">
      <div class="search-wrapper">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.3-4.3" />
        </svg>
        <input type="text" id="search-input" placeholder="Search tasks...">
      </div>

      <div class="controls-wrapper">
        <!-- Filter Tabs -->
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="active">Active</button>
          <button class="filter-tab" data-filter="completed">Completed</button>
        </div>

        <!-- Sort Select -->
        <div class="sort-wrapper">
          <label for="sort-select" class="visually-hidden">Sort by</label>
          <select id="sort-select">
            <option value="createdAt-desc">Newest First</option>
            <option value="createdAt-asc">Oldest First</option>
            <option value="dueDate-asc">Due Date (Soonest)</option>
            <option value="priority-desc">Priority (High to Low)</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Task List Container -->
    <main class="task-section">
      <div class="task-list-header">
        <span id="list-summary-text">Showing 0 tasks</span>
        <button id="clear-completed-btn" class="btn-text-only hidden">
          Clear Completed
        </button>
      </div>

      <ul id="task-list" class="task-list">
        <!-- Dynamic list contents go here -->
      </ul>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state">
        <div class="empty-illustration">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4" />
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
          </svg>
        </div>
        <h3>All caught up!</h3>
        <p>No tasks match your criteria. Relax or add a new one.</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>

</html>
